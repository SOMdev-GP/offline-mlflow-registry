name: MLflow CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # =========================
    # 🧠 TRAIN MODEL
    # =========================
    - name: Train model
      run: python src/train.py

    # =========================
    # 📦 UPLOAD RUN ID (FROM TRAIN)
    # =========================
    - name: Upload run id
      uses: actions/upload-artifact@v4
      with:
        name: run-id
        path: run_id.txt

    # =========================
    # ⬇️ DOWNLOAD RUN ID (FOR NEXT STEP)
    # =========================
    - name: Download run id
      uses: actions/download-artifact@v4
      with:
        name: run-id

    # =========================
    # 📊 EVALUATE MODEL
    # =========================
    - name: Evaluate model
      run: python src/evaluate.py